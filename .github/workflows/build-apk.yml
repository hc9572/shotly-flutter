name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build prod debug APK
        run: flutter build apk --flavor prod --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shotly-prod-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-prod-debug.apk
          if-no-files-found: error
          retention-days: 14
